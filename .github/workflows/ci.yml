name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon version
        run: moon version --all
      - name: Moon update
        run: moon update
      - name: Verify format
        run: just fmt-check
      - name: Verify generated interfaces
        run: just info-check

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: js
          - os: ubuntu-latest
            target: native
            duckdb_asset: libduckdb-linux-amd64.zip
          - os: macos-latest
            target: native
            duckdb_asset: libduckdb-osx-universal.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Install DuckDB native library
        if: matrix.target == 'native'
        run: |
          set -eu
          dest="$HOME/brew/opt/duckdb"
          mkdir -p "$dest/include" "$dest/lib"
          tmpdir="$(mktemp -d)"
          curl -fsSL \
            -o "$tmpdir/duckdb.zip" \
            "https://github.com/duckdb/duckdb/releases/download/v1.4.4/${{ matrix.duckdb_asset }}"
          unzip -q "$tmpdir/duckdb.zip" -d "$tmpdir/unpacked"
          cp "$tmpdir/unpacked/duckdb.h" "$dest/include/duckdb.h"
          if [ -f "$tmpdir/unpacked/libduckdb.dylib" ]; then
            cp "$tmpdir/unpacked/libduckdb.dylib" "$dest/lib/libduckdb.dylib"
          else
            cp "$tmpdir/unpacked/libduckdb.so" "$dest/lib/libduckdb.so"
          fi
      - name: Moon version
        run: moon version --all
      - name: Moon update
        run: moon update
      - name: Moon check
        run: just target=${{ matrix.target }} check
      - name: Moon test
        run: just target=${{ matrix.target }} test

  playground:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup just
        uses: extractions/setup-just@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: playground/pnpm-lock.yaml
      - name: Install MoonBit CLI
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
      - name: Moon version
        run: moon version --all
      - name: Moon update
        run: moon update
      - name: Install playground dependencies
        run: pnpm --dir playground install --frozen-lockfile
      - name: Playground check
        run: just playground-check
